<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>

<body style="background-color:rgb(202, 211, 224); display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0;">

    <form onsubmit="return registrationForm()"
          style="background:rgba(196, 104, 201, 0.671); padding:25px; border:2px solid black; border-radius:10px; width:400px; box-shadow:0px 0px 15px gray;">

        <h2 style="text-align:center;">Student Registration Form</h2>

        <label for="roll">Roll Number:</label>
        <input type="text" id="roll" name="roll" required><br><br>

        <label for="name">Student Name:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label>Father Name:</label>
        <input type="text" id="fatherName" name="fatherName" required><br><br>

        <label>Date of Birth:</label>
        <input type="date" id="dob" name="dob" required><br><br>

        <label>Mobile Number:</label>
        <input type="text" id="mobile" name="mobile" required><br><br>

        <label>Email ID:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label>Password:</label>
        <input type="password" id="password" name="password" required><br><br>

        <label>Gender:</label>
        <input type="radio" name="gender" value="male" required> Male
        <input type="radio" name="gender" value="female" required> Female
        <br><br>

        <label>Department:</label>
        <input type="checkbox" id="CSE" name="department" value="CSE">
        <label for="CSE">CSE</label>

        <input type="checkbox" id="IT" name="department" value="IT">
        <label for="IT">IT</label>

        <input type="checkbox" id="ME" name="department" value="ME">
        <label for="ME">ME</label>

        <input type="checkbox" id="Civil" name="department" value="Civil">
        <label for="Civil">Civil</label>
        <br><br>

        <label>Course:</label>
        <select id="course" name="course">
            <option value="btech">B.Tech</option>
            <option value="mtech">M.Tech</option>
            <option value="bca">BCA</option>
            <option value="mca">MCA</option>
        </select>
        <br><br>

        <label>Student Photo:</label>
        <input type="file" id="photo" name="photo"><br><br>

        <label>City:</label>
        <input type="text" id="city" name="city" required><br><br>

        <label>Address:</label>
        <input type="text" id="address" name="address" required><br><br>

        <input type="submit" value="Register">
    </form>

    <script>
        function registrationForm() {
            alert("Registration Successful!");
            return true;
        }
    </script>

</body>
</html>
